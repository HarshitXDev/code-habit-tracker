kind = "web"
previewPath = "/"
title = "Coding Daily Todo"
version = "1.0.0"
id = "artifacts/code-todo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18146

[services.development]
run = "pnpm --filter @workspace/code-todo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/code-todo", "run", "build" ]
publicDir = "artifacts/code-todo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18146"
BASE_PATH = "/"
